<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>{{if eq .Mode "register"}}Register{{else}}Sign in{{end}} — Situation Monitor</title>
	<style>
		:root { color-scheme: dark light; --bg: #fff; --fg: #111; --dim: #888; --border: #ddd; --link: #0b5fff; --err: #d44; }
		* { box-sizing: border-box; margin: 0; padding: 0; }
		body {
			font-family: system-ui, -apple-system, sans-serif;
			line-height: 1.5;
			padding: 1rem 1rem 4rem;
			max-width: 720px;
			margin: 0 auto;
			min-height: 100dvh;
			background: var(--bg);
			color: var(--fg);
		}
		body.dark { --bg: #111; --fg: #e8e8e8; --dim: #777; --border: #333; --link: #6af; --err: #f66; }
		nav {
			display: flex;
			gap: 0.75rem;
			align-items: center;
			font-size: 0.85rem;
			padding: 0.5rem 0 1rem;
			border-bottom: 1px solid var(--border);
			margin-bottom: 1.25rem;
		}
		nav a { text-decoration: none; color: inherit; opacity: 0.6; }
		nav a:hover { opacity: 1; }
		.nav-spacer { flex: 1; }
		.theme-btn {
			background: none; border: none; cursor: pointer;
			padding: 0.25rem; opacity: 0.5;
			color: inherit; display: flex; align-items: center;
		}
		.theme-btn:hover { opacity: 1; }
		.theme-btn svg { width: 16px; height: 16px; fill: currentColor; stroke: currentColor; stroke-width: 2; stroke-linecap: round; }

		.auth-form {
			max-width: 320px;
			margin: 3rem auto 0;
		}
		.auth-form h1 {
			font-size: 1.2rem;
			margin-bottom: 1.5rem;
		}
		.auth-form .field {
			margin-bottom: 1rem;
		}
		.auth-form input {
			display: block;
			width: 100%;
			font: inherit;
			font-size: 0.92rem;
			padding: 0.5rem 0.65rem;
			border: 1px solid var(--border);
			border-radius: 4px;
			background: transparent;
			color: inherit;
		}
		.auth-form input:focus {
			outline: none;
			border-color: var(--link);
		}
		.auth-form button[type="submit"] {
			display: block;
			width: 100%;
			font: inherit;
			font-size: 0.92rem;
			padding: 0.5rem;
			border: 1px solid var(--border);
			border-radius: 4px;
			background: transparent;
			color: inherit;
			cursor: pointer;
			margin-top: 1.25rem;
		}
		.auth-form button[type="submit"]:hover {
			background: var(--link);
			color: var(--bg);
			border-color: var(--link);
		}
		.auth-form .error {
			color: var(--err);
			font-size: 0.85rem;
			margin-bottom: 1rem;
		}
		.auth-form .switch {
			font-size: 0.82rem;
			color: var(--dim);
			margin-top: 1rem;
			text-align: center;
		}
		.auth-form .switch a {
			color: var(--link);
			text-decoration: none;
		}
		.auth-form .switch a:hover { text-decoration: underline; }

		.site-footer {
			font-size: 0.75rem;
			color: var(--dim);
			padding-top: 1rem;
			margin-top: 2rem;
			border-top: 1px solid var(--border);
			display: flex;
			gap: 0.75rem;
			align-items: center;
			flex-wrap: wrap;
		}
		.site-footer a { color: var(--dim); text-decoration: none; }
		.site-footer a:hover { color: var(--fg); }
		.footer-spacer { flex: 1; }

		@media (prefers-color-scheme: dark) {
			:root:not(.light-forced) { --bg: #111; --fg: #e8e8e8; --dim: #777; --border: #333; --link: #6af; --err: #f66; }
		}
	</style>
</head>
<body>
	<nav>
		<a href="/">Feed</a>
		<a href="/daily/">Briefings</a>
		<a href="/situations">Situations</a>
		<a href="/alpha">Alpha</a>
		<span class="nav-spacer"></span>
		<button class="theme-btn" id="theme-toggle"></button>
	</nav>

	<div class="auth-form">
		{{if eq .Mode "register"}}
		<h1>Create account</h1>
		<form method="post" action="/login">
			<input type="hidden" name="mode" value="register">
			{{if .Error}}<div class="error">{{.Error}}</div>{{end}}
			<div class="field"><input type="text" name="username" placeholder="Username" value="{{.Username}}" autocomplete="username" required minlength="3" maxlength="30" autofocus></div>
			<div class="field"><input type="email" name="email" placeholder="Email" value="{{.Email}}" autocomplete="email" required></div>
			<div class="field"><input type="password" name="password" placeholder="Password" autocomplete="new-password" required minlength="8"></div>
			<button type="submit">Create account</button>
		</form>
		<div class="switch">Already have an account? <a href="/login">Sign in</a></div>
		{{else}}
		<h1>Sign in</h1>
		<form method="post" action="/login">
			<input type="hidden" name="mode" value="login">
			{{if .Error}}<div class="error">{{.Error}}</div>{{end}}
			<div class="field"><input type="text" name="username" placeholder="Username" value="{{.Username}}" autocomplete="username" required autofocus></div>
			<div class="field"><input type="password" name="password" placeholder="Password" autocomplete="current-password" required></div>
			<button type="submit">Sign in</button>
		</form>
		<div class="switch">No account? <a href="/login?mode=register">Create one</a></div>
		{{end}}
	</div>

	<footer class="site-footer">
		<span>&copy; 2026 Mimir</span>
		<span class="footer-spacer"></span>
		<a href="/about">About</a>
		<a href="/terms">Terms</a>
		<a href="/privacy">Privacy</a>
		<a href="/content-notice">Content Notice</a>
	</footer>

	<script>
	(function(){
		var SUN='<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
		var MOON='<svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg>';
		var b=document.getElementById('theme-toggle'),s=localStorage.getItem('sm-theme');
		function d(m){return m==='dark'||(!m&&window.matchMedia('(prefers-color-scheme:dark)').matches)}
		function a(m){if(m==='dark'){document.body.classList.add('dark');document.documentElement.classList.add('light-forced')}else if(m==='light'){document.body.classList.remove('dark');document.documentElement.classList.add('light-forced')}else{document.body.classList.remove('dark');document.documentElement.classList.remove('light-forced')}b.innerHTML=d(m)?MOON:SUN}
		a(s);b.addEventListener('click',function(){var n=d(s)?'light':'dark';localStorage.setItem('sm-theme',n);s=n;a(n)});
	})();
	</script>
</body>
</html>
