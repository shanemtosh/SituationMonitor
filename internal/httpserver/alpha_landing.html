<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Alpha - Situation Monitor</title>
	<style>
		:root { color-scheme: dark light; --bg: #fff; --fg: #111; --dim: #888; --border: #ddd; --card-border: #ddd; --tag-bg: #eee; --hover-bg: rgba(128,128,128,0.1); }
		* { box-sizing: border-box; margin: 0; padding: 0; }
		body {
			font-family: system-ui, -apple-system, sans-serif;
			line-height: 1.5;
			padding: 1rem 1rem 4rem;
			max-width: 720px;
			margin: 0 auto;
			min-height: 100dvh;
			background: var(--bg);
			color: var(--fg);
		}
		body.dark { --bg: #111; --fg: #e8e8e8; --dim: #777; --border: #333; --card-border: #333; --tag-bg: #2a2a2a; --hover-bg: rgba(255,255,255,0.05); }

		nav {
			display: flex; gap: 0.75rem; align-items: center;
			font-size: 0.85rem; padding: 0.5rem 0 1rem;
			border-bottom: 1px solid var(--border); margin-bottom: 1.25rem; flex-wrap: wrap;
		}
		nav a { text-decoration: none; color: inherit; opacity: 0.6; }
		nav a:hover { opacity: 1; }
		nav .active { opacity: 1; font-weight: 600; }
		.nav-spacer { flex: 1; }
		.theme-btn {
			background: none; border: none; cursor: pointer;
			padding: 0.25rem; opacity: 0.5; color: inherit; display: flex; align-items: center;
		}
		.theme-btn:hover { opacity: 1; }
		.theme-btn svg { width: 16px; height: 16px; fill: currentColor; stroke: currentColor; stroke-width: 2; stroke-linecap: round; }

		h1 { font-size: 1.25rem; margin-bottom: 0.25rem; }
		.subtitle { font-size: 0.85rem; color: var(--dim); margin-bottom: 1.5rem; }

		.domain-grid {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 0.75rem;
		}
		@media (max-width: 500px) { .domain-grid { grid-template-columns: 1fr; } }

		.domain-card {
			display: block;
			border: 1px solid var(--card-border);
			border-radius: 6px;
			padding: 1rem 1.25rem;
			text-decoration: none;
			color: inherit;
			transition: border-color 0.15s, background 0.15s;
		}
		.domain-card:hover { border-color: var(--fg); background: var(--hover-bg); }
		.domain-card h3 { font-size: 1rem; margin-bottom: 0.5rem; }
		.domain-stats {
			display: flex;
			flex-direction: column;
			gap: 0.15rem;
			font-size: 0.8rem;
			color: var(--dim);
		}
		.domain-stats .stat-num { font-weight: 600; color: var(--fg); }
		.domain-updated { font-size: 0.72rem; color: var(--dim); margin-top: 0.5rem; }
		.domain-empty { opacity: 0.5; }
		.domain-empty h3::after { content: " (new)"; font-weight: 400; font-size: 0.8rem; }
	</style>
</head>
<body>
	<nav>
		<a href="/">Feed</a>
		<a href="/daily/">Briefings</a>
		<a href="/situations">Situations</a>
		<a href="/alpha" class="active">Alpha</a>
		<span class="nav-spacer"></span>
		<button class="theme-btn" id="theme-toggle" title="Toggle theme"></button>
	</nav>

	<h1>Constraint-Based Alpha</h1>
	<p class="subtitle">Multi-domain analysis using the Papic framework</p>

	<div class="domain-grid" id="domains"><span style="color:var(--dim);font-size:0.85rem">Loading...</span></div>

	<script>
	(function(){
		const saved = localStorage.getItem('theme');
		if (saved === 'dark' || (!saved && matchMedia('(prefers-color-scheme:dark)').matches)) document.body.classList.add('dark');
		document.getElementById('theme-toggle').addEventListener('click', () => {
			document.body.classList.toggle('dark');
			localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
		});
		function setIcon() {
			const dark = document.body.classList.contains('dark');
			document.getElementById('theme-toggle').innerHTML = dark
				? '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'
				: '<svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg>';
		}
		setIcon();
		new MutationObserver(setIcon).observe(document.body, {attributes: true, attributeFilter: ['class']});
	})();

	function relDate(s) {
		if (!s) return '';
		const d = new Date(s);
		const diff = Date.now() - d.getTime();
		const hrs = Math.floor(diff / 3600000);
		if (hrs < 1) return Math.floor(diff / 60000) + 'm ago';
		if (hrs < 24) return hrs + 'h ago';
		return Math.floor(hrs / 24) + 'd ago';
	}

	fetch('/api/alpha/domains').then(r => r.json()).then(data => {
		const el = document.getElementById('domains');
		if (!data || !data.length) { el.innerHTML = '<span style="color:var(--dim)">No domains configured</span>'; return; }
		// Sort: domains with data first
		data.sort((a,b) => (b.active_assessments + b.active_constraints) - (a.active_assessments + a.active_constraints));
		el.innerHTML = data.map(d => {
			const hasData = d.active_assessments > 0 || d.active_constraints > 0;
			return `<a href="/alpha/${d.domain}" class="domain-card ${hasData ? '' : 'domain-empty'}">
				<h3>${d.label}</h3>
				<div class="domain-stats">
					<span><span class="stat-num">${d.active_assessments}</span> active assessments</span>
					<span><span class="stat-num">${d.active_constraints}</span> constraints tracked</span>
					<span><span class="stat-num">${d.upcoming_events}</span> upcoming events</span>
				</div>
				${d.last_updated ? '<div class="domain-updated">Last updated ' + relDate(d.last_updated) + '</div>' : ''}
			</a>`;
		}).join('');
	});
	</script>
</body>
</html>
